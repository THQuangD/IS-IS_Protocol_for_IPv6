!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R2
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
ip cef
!
!
!
!
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
ipv6 unicast-routing
!
!
!
!
key chain ISIS-KEY
 key 1
   key-string Nhom3ISISV6
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
! 
!
!
!
!
interface Loopback0
 no ip address
 ipv6 address 2001:DB8:ACAD:20::1/128
 ipv6 router isis 
!
interface FastEthernet0/0
 description Link-to-R1
 no ip address
 duplex auto
 speed auto
 ipv6 address 2001:DB8:ACAD:12::2/64
 ipv6 router isis 
 isis circuit-type level-1
 isis authentication mode md5 level-1
 isis authentication key-chain ISIS-KEY level-1
!
interface Serial0/0
 no ip address
 shutdown
 no fair-queue
 clock rate 2000000
!
interface FastEthernet0/1
 description Backbone-L2-to-R3
 no ip address
 duplex auto
 speed auto
 ipv6 address 2001:DB8:ACAD:23::2/64
 ipv6 router isis 
 isis circuit-type level-2-only
 isis authentication mode md5 level-2
 isis authentication key-chain ISIS-KEY level-2
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router isis 
 net 49.0001.0000.0000.0020.00
 authentication mode md5
 authentication key-chain ISIS-KEY
 metric-style wide
 !
 address-family ipv6
  multi-topology
 exit-address-family
!
ip forward-protocol nd
!
!
ip http server
no ip http secure-server
!
!
!
ipv6 prefix-list LEAK-V6 seq 5 permit 2001:DB8::/32 le 128
route-map LEAK-MAP permit 10
 match ipv6 address prefix-list LEAK-V6
!
!
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
line aux 0
line vty 0 4
 login
!
!
end
