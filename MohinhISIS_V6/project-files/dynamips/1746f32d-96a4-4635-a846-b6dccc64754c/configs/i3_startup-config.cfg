!
!

!
version 12.4
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname R3
!
boot-start-marker
boot-end-marker
!
!
no aaa new-model
memory-size iomem 5
ip cef
!
!
!
!
ip auth-proxy max-nodata-conns 3
ip admission max-nodata-conns 3
!
ipv6 unicast-routing
!
!
!
!
key chain ISIS-KEY
 key 1
   key-string Nhom3ISISV6
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
! 
!
!
!
!
interface Loopback0
 no ip address
 ipv6 address 2001:DB8:ACAD:30::1/128
 ipv6 router isis 
!
interface FastEthernet0/0
 description Link-to-R4
 no ip address
 duplex auto
 speed auto
 ipv6 address 2001:DB8:ACAD:34::3/64
 ipv6 router isis 
 isis circuit-type level-1
 isis authentication mode md5 level-1
 isis authentication key-chain ISIS-KEY level-1
!
interface Serial0/0
 no ip address
 shutdown
 no fair-queue
 clock rate 2000000
!
interface FastEthernet0/1
 description Backbone-L2-from-R2
 no ip address
 duplex auto
 speed auto
 ipv6 address 2001:DB8:ACAD:23::3/64
 ipv6 router isis 
 isis circuit-type level-2-only
 isis authentication mode md5 level-2
 isis authentication key-chain ISIS-KEY level-2
!
interface Serial0/1
 no ip address
 shutdown
 clock rate 2000000
!
interface Serial0/2
 no ip address
 shutdown
 clock rate 2000000
!
interface FastEthernet1/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet2/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet3/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
interface FastEthernet4/0
 no ip address
 shutdown
 duplex auto
 speed auto
!
router isis 
 net 49.0002.0000.0000.0030.00
 authentication mode md5
 authentication key-chain ISIS-KEY
 metric-style wide
 !
 address-family ipv6
  multi-topology
 exit-address-family
!
ip forward-protocol nd
!
!
ip http server
no ip http secure-server
!
!
!
!
ipv6 access-list LEAK-ALL
 permit ipv6 any any
!
control-plane
!
!
!
!
!
!
!
!
!
!
line con 0
 exec-timeout 0 0
line aux 0
line vty 0 4
 login
!
!
end
